<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO -->
    <title>Slice Heaven | Authentic Wood-Fired Pizza Delivery</title>
    <meta name="description" content="Order the best wood-fired pizza in town. Fresh ingredients, artisanal dough, and lightning-fast delivery. Slice Heaven - your local pizza paradise." />
    <link rel="canonical" href="https://sliceheaven.example.com" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Slice Heaven | Authentic Wood-Fired Pizza" />
    <meta property="og:description" content="Order the best wood-fired pizza in town. Fresh ingredients, artisanal dough, and lightning-fast delivery." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sliceheaven.example.com" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200&q=80" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Slice Heaven",
        "image": "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200&q=80",
        "@id": "https://sliceheaven.example.com",
        "url": "https://sliceheaven.example.com",
        "telephone": "+1234567890",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Pizza Lane",
          "addressLocality": "Dough City",
          "postalCode": "12345",
          "addressCountry": "US"
        },
        "servesCuisine": "Pizza",
        "priceRange": "$$"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
